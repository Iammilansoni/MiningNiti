name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Backend Linting ────────────────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install black==24.8.0 isort==5.13.0 mypy==1.11.0

      - name: Check formatting (black)
        run: black --check app/ tests/

      - name: Check imports (isort)
        run: isort --check-only app/ tests/

      - name: Type checking (mypy)
        run: |
          pip install -r requirements.txt
          mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Don't fail CI on type errors yet (gradual adoption)

  # ── Job 2: Backend Security Scan ─────────────────────────────────────────────
  backend-security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r app/ -ll -x app/tests
        continue-on-error: true  # Report but don't block yet

  # ── Job 3: Backend Tests ──────────────────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: miningniti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/miningniti_test
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST || 'test-api-key-placeholder' }}
      CLERK_JWKS_URL: https://test.clerk.com/.well-known/jwks.json
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: python -m alembic upgrade head
        continue-on-error: true  # May fail if pgvector not in test DB

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "unit"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            -m "integration"
        continue-on-error: true  # Integration tests need real services

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 4: Frontend Build ─────────────────────────────────────────────────────
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.miningniti.com

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Job 5: Docker Build Validation ───────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: miningniti-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
